<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Чат с менеджером</title>
  <style>
    :root {
      --header-blue: #2f6feb;
      --header-blue-dark: #2566d8;
      --bubble-user: #cfe5fc;
      --bubble-bot: #eceff4;
      --text: #1a1a1a;
      --text-muted: #6b7280;
      --online: #22c55e;
      --border: #e5e7eb;
      --shadow: 0 12px 40px rgba(15, 23, 42, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f3f4f6;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .widget {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      max-height: min(720px, calc(100vh - 2rem));
      transition: opacity 0.2s, transform 0.2s;
    }
    .widget.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px) scale(0.96);
      position: absolute;
      width: min(400px, 100%);
    }
    .widget-header {
      background: linear-gradient(180deg, var(--header-blue) 0%, var(--header-blue-dark) 100%);
      color: #fff;
      padding: 0.85rem 0.75rem 0.85rem 0.9rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .hdr-left {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      min-width: 0;
    }
    .avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .avatar-wrap img {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255, 255, 255, 0.35);
      display: block;
      background: rgba(255, 255, 255, 0.2);
    }
    .online {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 11px;
      height: 11px;
      background: var(--online);
      border-radius: 50%;
      border: 2px solid var(--header-blue-dark);
    }
    .hdr-text { min-width: 0; }
    .hdr-name {
      font-weight: 700;
      font-size: 1rem;
      line-height: 1.2;
      letter-spacing: 0.01em;
    }
    .hdr-role {
      font-size: 0.8125rem;
      opacity: 0.92;
      margin-top: 0.1rem;
    }
    .hdr-typing {
      font-size: 0.75rem;
      margin-top: 0.25rem;
      opacity: 0.75;
      font-style: italic;
    }
    .hdr-typing[hidden] { display: none !important; }
    .hdr-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.35rem;
    }
    .icon-btn {
      background: transparent;
      border: none;
      color: #fff;
      cursor: pointer;
      padding: 0.15rem 0.35rem;
      border-radius: 6px;
      font-size: 1.25rem;
      line-height: 1;
      opacity: 0.95;
    }
    .icon-btn:hover { background: rgba(255, 255, 255, 0.15); }
    .icon-btn.sound-on { font-size: 1rem; }
    .chat-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: #fafafa;
    }
    .chat-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem 0.65rem 1rem;
      scroll-behavior: smooth;
      min-height: 160px;
    }
    .date-sep {
      text-align: center;
      font-size: 0.6875rem;
      color: var(--text-muted);
      margin: 0.25rem 0 0.85rem;
    }
    .msg-row {
      display: flex;
      margin-bottom: 0.65rem;
    }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }
    .msg-row.system { justify-content: center; }
    .bubble {
      max-width: 88%;
      border-radius: 14px;
      padding: 0.55rem 0.7rem 0.35rem;
      font-size: 0.875rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      position: relative;
    }
    .bubble.assistant {
      background: var(--bubble-bot);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .bubble.user {
      background: var(--bubble-user);
      color: var(--text);
      border-bottom-right-radius: 4px;
    }
    .bubble.system {
      background: transparent;
      color: var(--text-muted);
      font-size: 0.75rem;
      max-width: 95%;
      text-align: center;
      padding: 0.25rem 0.5rem;
    }
    .bubble-text { padding-bottom: 0.15rem; }
    .bubble-foot {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.25rem;
      margin-top: 0.15rem;
    }
    .bubble-time {
      font-size: 0.625rem;
      color: var(--text-muted);
      opacity: 0.85;
    }
    .bubble.user .bubble-foot .bubble-time { color: #4b5563; }
    .read-check {
      display: inline-flex;
      color: var(--header-blue);
      font-size: 0.7rem;
      line-height: 1;
      letter-spacing: -0.12em;
      margin-left: 0.1rem;
    }
    .composer {
      display: flex;
      align-items: flex-end;
      gap: 0.45rem;
      padding: 0.55rem 0.65rem 0.65rem;
      background: #fff;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #msg {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.55rem 0.85rem;
      font: inherit;
      font-size: 0.875rem;
      line-height: 1.45;
      outline: none;
      background: #f9fafb;
      min-height: 5.5rem;
      max-height: 14rem;
      resize: vertical;
      width: 100%;
    }
    #msg:focus {
      border-color: var(--header-blue);
      background: #fff;
    }
    #send {
      flex-shrink: 0;
      align-self: flex-end;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      background: var(--header-blue);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      line-height: 1;
      transition: background 0.15s;
    }
    #send:hover { background: var(--header-blue-dark); }
    #send:disabled { opacity: 0.45; cursor: not-allowed; }
    .fab-reopen {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: var(--header-blue);
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(47, 111, 235, 0.45);
      z-index: 10;
    }
    .fab-reopen[hidden] { display: none !important; }
  </style>
</head>
<body>
  <div class="widget" id="widget" aria-label="Чат с менеджером">
    <header class="widget-header">
      <div class="hdr-left">
        <div class="avatar-wrap">
          <img src="alexandr.png" width="44" height="44" alt="Александр" />
          <span class="online" title="На связи"></span>
        </div>
        <div class="hdr-text">
          <div class="hdr-name">Александр</div>
          <div class="hdr-role">менеджер</div>
          <div class="hdr-typing" id="typing-status" hidden>… Печатает</div>
        </div>
      </div>
      <div class="hdr-actions">
        <button type="button" class="icon-btn" id="widget-close" aria-label="Закрыть чат">×</button>
        <button type="button" class="icon-btn sound-on" id="sound-toggle" aria-label="Уведомления" title="Звук ответов">🔔</button>
      </div>
    </header>

    <div class="chat-wrap">
      <div id="log" class="chat-scroll" aria-live="polite"></div>
    </div>

    <div class="composer">
      <textarea
        id="msg"
        rows="4"
        maxlength="12000"
        autocomplete="off"
        placeholder="Напишите сообщение…"
        title="Enter — отправить, Shift+Enter — перенос строки"
      ></textarea>
      <button type="button" id="send" title="Отправить" aria-label="Отправить">➤</button>
    </div>
  </div>

  <button type="button" class="fab-reopen" id="widget-reopen" hidden aria-label="Открыть чат">💬</button>

  <script>
    const STORAGE_KEY = "assistant_dm_session_id";

    const logEl = document.getElementById("log");
    const input = document.getElementById("msg");
    const sendBtn = document.getElementById("send");
    const typingStatus = document.getElementById("typing-status");
    const widgetEl = document.getElementById("widget");
    const widgetClose = document.getElementById("widget-close");
    const widgetReopen = document.getElementById("widget-reopen");

    function setSending(on) {
      input.disabled = on;
      sendBtn.disabled = on;
    }

    function apiBase() {
      return "";
    }

    function sessionId() {
      let id = sessionStorage.getItem(STORAGE_KEY);
      if (!id) {
        id = crypto.randomUUID();
        sessionStorage.setItem(STORAGE_KEY, id);
      }
      return id;
    }

    function nowTimeLabel() {
      const d = new Date();
      return d.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });
    }

    function nowDateSepLabel() {
      const d = new Date();
      return (
        d.toLocaleDateString("ru-RU", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric",
        }) +
        " " +
        d.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" })
      );
    }

    function setTypingHeader(on) {
      typingStatus.hidden = !on;
    }

    function appendDateSeparator() {
      const row = document.createElement("div");
      row.className = "date-sep";
      row.textContent = nowDateSepLabel();
      logEl.appendChild(row);
    }

    function appendBubble(role, text, opts) {
      const row = document.createElement("div");
      row.className = "msg-row " + role;
      const bubble = document.createElement("div");
      bubble.className = "bubble " + role;
      const body = document.createElement("div");
      body.className = "bubble-text";
      body.textContent = text;
      bubble.appendChild(body);
      const foot = document.createElement("div");
      foot.className = "bubble-foot";
      const t = document.createElement("span");
      t.className = "bubble-time";
      t.textContent = nowTimeLabel();
      foot.appendChild(t);
      if (role === "user") {
        const checks = document.createElement("span");
        checks.className = "read-check";
        checks.textContent = "✓✓";
        checks.title = "Доставлено";
        foot.appendChild(checks);
      }
      bubble.appendChild(foot);
      row.appendChild(bubble);
      logEl.appendChild(row);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function appendAssistantTyping(fullText) {
      const row = document.createElement("div");
      row.className = "msg-row assistant";
      const bubble = document.createElement("div");
      bubble.className = "bubble assistant";
      const body = document.createElement("div");
      body.className = "bubble-text";
      bubble.appendChild(body);
      const foot = document.createElement("div");
      foot.className = "bubble-foot";
      const t = document.createElement("span");
      t.className = "bubble-time";
      t.textContent = nowTimeLabel();
      foot.appendChild(t);
      bubble.appendChild(foot);
      row.appendChild(bubble);
      logEl.appendChild(row);

      const n = fullText.length;
      let chunk = 1;
      let delayMs = 14;
      if (n > 900) {
        chunk = 5;
        delayMs = 9;
      } else if (n > 500) {
        chunk = 4;
        delayMs = 10;
      } else if (n > 200) {
        chunk = 3;
        delayMs = 11;
      } else if (n > 80) {
        chunk = 2;
        delayMs = 12;
      }

      return new Promise((resolve) => {
        let i = 0;
        function tick() {
          if (i >= n) {
            body.textContent = fullText;
            logEl.scrollTop = logEl.scrollHeight;
            resolve();
            return;
          }
          i = Math.min(n, i + chunk);
          body.textContent = fullText.slice(0, i);
          logEl.scrollTop = logEl.scrollHeight;
          setTimeout(tick, delayMs);
        }
        tick();
      });
    }

    let soundEnabled = true;
    document.getElementById("sound-toggle").addEventListener("click", () => {
      soundEnabled = !soundEnabled;
      document.getElementById("sound-toggle").textContent = soundEnabled ? "🔔" : "🔕";
    });

    widgetClose.addEventListener("click", () => {
      widgetEl.classList.add("hidden");
      widgetReopen.hidden = false;
    });
    widgetReopen.addEventListener("click", () => {
      widgetEl.classList.remove("hidden");
      widgetReopen.hidden = true;
      input.focus();
    });

    async function sendMessage(text) {
      const trimmed = text.trim();
      if (!trimmed) return;
      appendBubble("user", trimmed);
      input.value = "";
      setSending(true);
      setTypingHeader(true);
      try {
        const sid = sessionId();
        const res = await fetch(apiBase() + "/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sid, message: trimmed }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          setTypingHeader(false);
          appendBubble("system", "Ошибка " + res.status + ": " + (data.detail || JSON.stringify(data)));
          return;
        }
        if (data.session_id) sessionStorage.setItem(STORAGE_KEY, data.session_id);
        await appendAssistantTyping(data.reply || "(пустой ответ)");
        if (soundEnabled && typeof Audio !== "undefined") {
          try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.connect(g);
            g.connect(ctx.destination);
            o.frequency.value = 880;
            g.gain.value = 0.03;
            o.start();
            setTimeout(() => {
              o.stop();
              ctx.close();
            }, 60);
          } catch (_) {}
        }
      } catch (e) {
        appendBubble("system", "Сеть: " + (e && e.message ? e.message : String(e)));
      } finally {
        setTypingHeader(false);
        setSending(false);
        input.focus();
      }
    }

    document.getElementById("send").addEventListener("click", () => sendMessage(input.value));

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage(input.value);
      }
    });

    appendDateSeparator();
    appendBubble(
      "assistant",
      "Приветствую Вас! Я ассистент Дмитрия Мальцева. Напишите, какой тренинг вас интересует, а я отвечу на ваши вопросы."
    );
    input.focus();
  </script>
</body>
</html>
